<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Gesture Planet</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 13px;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 8px;
            max-width: 280px;
        }
        #current-gesture {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff8800;
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="info">
        <p><strong>🎮 手势控制指南:</strong></p>
        <p>• 1根手指 + 左右滑动: 星环缩放 + 粒子脉冲</p>
        <p>• 2根手指 + 上下滑动: 整体缩放 + 粒子脉冲</p>
        <p>• 3根手指: 星球抖动效果</p>
        <p>• 4根手指: 星环波动效果</p>
        <p>• 5指张开 + 靠近: 拉近镜头</p>
        <p>• 握拳 + 远离: 拉远镜头</p>
        <p>• 任意手势旋转: 星球旋转</p>
    </div>
    <div id="current-gesture">等待手势...</div>
    <div id="start-button-container">
        <button id="start-button">Start Camera</button>
    </div>
    <div id="error-message" style="display: none;"></div>
    <style>
        #start-button-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        #start-button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #start-button:hover {
            background: #45a049;
        }
        #error-message {
            position: absolute;
            top: 100px;
            left: 10px;
            color: red;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/particles/ParticleSystem.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/particles/ParticleBasicMaterial.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/particles/ParticleSystemMaterial.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/geometries/OctahedronGeometry.js"></script>
    <!-- MediaPipe scripts using jsdelivr -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <!-- Load app.js after all dependencies -->
    <script src="app.js"></script>
</body>
</html>
